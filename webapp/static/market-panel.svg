<svg width="240" height="180" viewBox="0 0 240 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="240" height="180" rx="12" fill="#f9fafb"/>
  
  <!-- Chart area -->
  <rect x="20" y="20" width="200" height="120" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Grid lines -->
  <line x1="20" y1="50" x2="220" y2="50" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="20" y1="80" x2="220" y2="80" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="20" y1="110" x2="220" y2="110" stroke="#f3f4f6" stroke-width="1"/>
  
  <!-- Chart line with gradient -->
  <path d="M 30 120 L 50 100 L 70 110 L 90 85 L 110 90 L 130 70 L 150 75 L 170 55 L 190 60 L 210 40" 
        stroke="url(#grad1)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Area under curve -->
  <path d="M 30 120 L 50 100 L 70 110 L 90 85 L 110 90 L 130 70 L 150 75 L 170 55 L 190 60 L 210 40 L 210 140 L 30 140 Z" 
        fill="url(#grad2)" opacity="0.3"/>
  
  <!-- Data points -->
  <circle cx="30" cy="120" r="4" fill="#6366f1"/>
  <circle cx="70" cy="110" r="4" fill="#6366f1"/>
  <circle cx="110" cy="90" r="4" fill="#6366f1"/>
  <circle cx="150" cy="75" r="4" fill="#6366f1"/>
  <circle cx="190" cy="60" r="4" fill="#6366f1"/>
  <circle cx="210" cy="40" r="5" fill="#10b981"/>
  
  <!-- Labels -->
  <text x="30" y="160" font-family="Inter, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Q1</text>
  <text x="90" y="160" font-family="Inter, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Q2</text>
  <text x="150" y="160" font-family="Inter, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Q3</text>
  <text x="210" y="160" font-family="Inter, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Q4</text>
  
  <!-- Title -->
  <text x="120" y="15" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151" text-anchor="middle">Financial Performance</text>
  
  <!-- Metric badge -->
  <rect x="165" y="25" width="50" height="18" rx="4" fill="#d1fae5"/>
  <text x="190" y="36" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#065f46" text-anchor="middle">+24%</text>
</svg>
